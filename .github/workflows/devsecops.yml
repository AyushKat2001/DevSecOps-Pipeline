name: DevsecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: AyushKat2001/devsecops-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
    
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  checkov-scan:
        name: IaC Security Scan (Checkov)
        runs-on: ubuntu-latest
        needs: test

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Install Checkov
            run: pip install checkov

          - name: Run Checkov on Terraform
            uses: bridgecrewio/checkov-action@master
            with:
              directory: terraform/
              framework: terraform
              output_format: cli
              soft_fail: true
        
          - name: Run Checkov on Dockerfiles
            uses: bridgecrewio/checkov-action@master
            with:
              directory: .
              framework: dockerfile
              output_format: cli
              soft_fail: true
  
  build-and-scan:
    name: Build + Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
            docker build -t $IMAGE_NAME:$IMAGE_TAG .
            docker build -t $IMAGE_NAME:latest .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
            image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '1'
            severity: CRITICAL
            ignore-unfixed: true


      - name: Run Trivy and generate SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
        if: always()
             
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
    
      - name: Generate SBOM 
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: cyclonedx
          output: sbom.json
    
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
    
      - name: Push Docker image to Docker Hub
        if: success()
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest
    
  sign-image:
    name: Sign Container Image (Cosign)
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
    
      - name: Sign the Docker image with Cosign
        run: |
            cosign sign --yes ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify the signed image
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
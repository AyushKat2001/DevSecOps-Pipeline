name: DevsecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
    
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  checkov-scan:
        name: IaC Security Scan (Checkov)
        runs-on: ubuntu-latest
        needs: test

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Install Checkov
            run: pip install checkov

          - name: Run Checkov on Terraform
            uses: bridgecrewio/checkov-action@master
            with:
              directory: terraform/
              framework: terraform
              output_format: cli
              soft_fail: true
        
          - name: Run Checkov on Dockerfiles
            uses: bridgecrewio/checkov-action@master
            with:
              directory: .
              framework: dockerfile
              output_format: cli
              soft_fail: true
  
  build-and-scan:
    name: Build + Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test 
    permissions:
      contents: read    
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
            docker build -t devsecops-app:latest .

      - name: Debug Docker images
        run: docker images

      - name: Install Trivy
        run: |
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy

      - name: Run Trivy scan (local image)
        run: |
            trivy image --severity CRITICAL --exit-code 1 devsecops-app:latest

      - name: Generate SARIF report
        if: always()
        run: |
            trivy image --format sarif -o trivy-results.sarif devsecops-app:latest
             
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        if: always()
    
      - name: Generate SBOM 
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:latest
          format: cyclonedx
          output: sbom.json
    
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Tag image for Docker Hub
        run: |
          docker tag devsecops-app:latest ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag devsecops-app:latest ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image to Docker Hub
        run: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker push ${{ env.IMAGE_NAME }}:latest
    
  sign-image:
    name: Sign Container Image (Cosign)
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
    
      - name: Sign the Docker image with Cosign
        run: |
            cosign sign --yes ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify the signed image
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}